name: Pantry
options:
  bundleIdPrefix: com.pantry
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  Pantry:
    type: application
    platform: iOS
    sources:
      - path: Pantry
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pantry.app
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Pantry/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    entitlements:
      path: Pantry/Pantry.entitlements
      properties:
        com.apple.developer.siri: true
